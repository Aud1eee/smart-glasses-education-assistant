<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Rokid Learning State HUD</title>
    <style>
        :root {
            --primary: #00ff9d;
            --ink: #f4fff9;
            --muted: rgba(244, 255, 249, 0.58);
            --panel: rgba(0, 18, 14, 0.72);
            --line: rgba(0, 255, 157, 0.42);
            --medium: #ffcc00;
            --high: #ff3158;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            background:
                radial-gradient(circle at 18% 20%, rgba(0, 255, 157, 0.16), transparent 32%),
                radial-gradient(circle at 80% 82%, rgba(255, 204, 0, 0.12), transparent 30%),
                linear-gradient(135deg, #020504 0%, #00130e 52%, #020504 100%);
            color: var(--ink);
            font-family: "Segoe UI", sans-serif;
            letter-spacing: 0;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
        }

        body.load-medium { box-shadow: inset 0 0 120px rgba(255, 204, 0, 0.20); }
        body.load-high { box-shadow: inset 0 0 140px rgba(255, 49, 88, 0.34); }

        .hud {
            position: relative;
            z-index: 1;
            height: 100%;
            padding: 36px;
            display: grid;
            grid-template-columns: minmax(260px, 340px) 1fr minmax(280px, 380px);
            gap: 28px;
            align-items: center;
        }

        .panel {
            border: 1px solid var(--line);
            background: var(--panel);
            box-shadow: 0 0 40px rgba(0, 255, 157, 0.08);
            backdrop-filter: blur(8px);
            padding: 22px;
        }

        .panel-title {
            color: var(--primary);
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 18px;
            text-transform: uppercase;
        }

        .metric { margin-bottom: 22px; }
        .metric:last-child { margin-bottom: 0; }

        .label {
            color: var(--muted);
            font-size: 12px;
            text-transform: uppercase;
        }

        .value {
            color: #fff;
            font-size: 42px;
            font-weight: 800;
            line-height: 1.05;
            margin-top: 6px;
        }

        .small-value {
            color: #fff;
            font-size: 24px;
            font-weight: 700;
            margin-top: 8px;
        }

        .note-value {
            color: rgba(255, 255, 255, 0.78);
            font-size: 16px;
            line-height: 1.35;
            margin-top: 8px;
        }

        .bar {
            height: 8px;
            margin-top: 10px;
            background: rgba(255, 255, 255, 0.13);
            overflow: hidden;
        }

        .bar span {
            display: block;
            height: 100%;
            width: 0%;
            background: var(--primary);
            transition: width 180ms ease, background 180ms ease;
        }

        .level-pill {
            display: inline-block;
            margin-top: 10px;
            padding: 7px 10px;
            border: 1px solid var(--line);
            color: var(--primary);
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .load-medium .level-pill,
        .load-medium .bar span { color: var(--medium); border-color: rgba(255, 204, 0, 0.5); background: var(--medium); }
        .load-high .level-pill,
        .load-high .bar span { color: var(--high); border-color: rgba(255, 49, 88, 0.58); background: var(--high); }

        .center {
            align-self: stretch;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-width: 0;
        }

        .guidance {
            max-width: 560px;
        }

        .guidance .state {
            color: var(--primary);
            font-size: 18px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 14px;
            letter-spacing: 1px;
        }

        .guidance .message {
            font-size: 34px;
            font-weight: 700;
            line-height: 1.18;
            text-wrap: balance;
        }

        #flashcard {
            position: fixed;
            z-index: 5;
            top: 34px;
            left: 50%;
            transform: translateX(-50%);
            min-width: 360px;
            max-width: min(720px, calc(100vw - 60px));
            background: rgba(0, 0, 0, 0.88);
            border: 2px solid var(--primary);
            padding: 18px 42px;
            display: none;
            text-align: center;
        }

        #word {
            margin: 0;
            font-size: 28px;
        }

        #trans {
            margin: 8px 0 0;
            color: rgba(255, 255, 255, 0.74);
            font-size: 18px;
        }

        @media (max-width: 820px) {
            .hud {
                grid-template-columns: 1fr;
                padding: 18px;
                gap: 16px;
                align-items: stretch;
                overflow-y: auto;
            }

            .center { min-height: 180px; }
            .guidance .message { font-size: 26px; }
            .value { font-size: 36px; }
        }
    </style>
</head>
<body onclick="audio=true">
    <div id="flashcard">
        <h2 id="word">Word</h2>
        <p id="trans">Translation</p>
    </div>

    <main class="hud">
        <section class="panel">
            <div class="panel-title">Learning State</div>
            <div class="metric">
                <div class="label">Focus Score</div>
                <div class="value"><span id="focus-val">100</span></div>
                <div class="bar"><span id="focus-bar"></span></div>
            </div>
            <div class="metric">
                <div class="label">Cognitive Load</div>
                <div class="value"><span id="load-val">0</span></div>
                <div class="bar"><span id="load-bar"></span></div>
                <div id="load-level" class="level-pill">LOW</div>
            </div>
            <div class="metric">
                <div class="label">Stability</div>
                <div class="small-value"><span id="stab-val">100</span>%</div>
            </div>
            <div class="metric">
                <div class="label">Pitch Delta</div>
                <div class="small-value"><span id="pitch-val">0.0</span> deg</div>
            </div>
        </section>

        <section class="center">
            <div class="guidance">
                <div id="state-label" class="state">FOCUS SETTLING</div>
                <div id="guidance-text" class="message">Keep learning steadily.</div>
            </div>
        </section>

        <section class="panel">
            <div class="panel-title">Adaptive Cycle</div>
            <div class="metric">
                <div class="label">Phase</div>
                <div id="phase-val" class="value">Focus</div>
            </div>
            <div class="metric">
                <div class="label">Time Left</div>
                <div id="time-left" class="value">25:00</div>
                <div class="bar"><span id="session-bar"></span></div>
            </div>
            <div class="metric">
                <div class="label">Signal</div>
                <div id="reason-val" class="small-value">Stable learning state</div>
            </div>
            <div class="metric">
                <div class="label">Difficulty Marker</div>
                <div id="event-val" class="small-value">Clear</div>
            </div>
            <div class="metric">
                <div class="label">Review Note</div>
                <div id="review-val" class="note-value">No flagged segment yet.</div>
            </div>
        </section>
    </main>

    <script>
        let audio = false;

        function clamp(value) {
            return Math.max(0, Math.min(100, Number(value) || 0));
        }

        function formatTime(seconds) {
            const safe = Math.max(0, Number(seconds) || 0);
            const min = Math.floor(safe / 60).toString().padStart(2, "0");
            const sec = Math.floor(safe % 60).toString().padStart(2, "0");
            return `${min}:${sec}`;
        }

        function setBar(id, value, invert) {
            const el = document.getElementById(id);
            el.style.width = `${clamp(value)}%`;
            if (invert) {
                el.style.opacity = 0.75 + (clamp(value) / 400);
            }
        }

        function setLoadClass(level) {
            document.body.classList.remove("load-medium", "load-high");
            if (level === "medium") document.body.classList.add("load-medium");
            if (level === "high") document.body.classList.add("load-high");
        }

        async function update() {
            try {
                const res = await fetch("/status");
                const d = await res.json();
                const session = d.session || {};
                const difficulty = d.difficulty || {};
                const activeEvent = difficulty.active_event || null;
                const lastEvent = difficulty.last_event || null;

                document.getElementById("pitch-val").innerText = Number(d.rel_pitch || 0).toFixed(1);
                document.getElementById("stab-val").innerText = Math.round(d.stability || 0);
                document.getElementById("focus-val").innerText = Math.round(d.focus_score || 0);
                document.getElementById("load-val").innerText = Math.round(d.cognitive_load || 0);
                document.getElementById("load-level").innerText = (d.load_level || "low").toUpperCase();
                document.getElementById("reason-val").innerText = d.load_reason || "Stable learning state";

                document.getElementById("phase-val").innerText = session.phase_label || "Focus";
                document.getElementById("time-left").innerText = formatTime(session.remaining_seconds);
                document.getElementById("state-label").innerText = (session.state_label || "Focus settling").toUpperCase();
                document.getElementById("guidance-text").innerText = session.guidance || "Keep learning steadily.";

                let eventText = "Clear";
                let reviewText = "No flagged segment yet.";
                if (activeEvent) {
                    eventText = `D${activeEvent.event_id} ${String(activeEvent.severity || "").toUpperCase()}`;
                    reviewText = activeEvent.review_note || activeEvent.primary_label || reviewText;
                } else if (lastEvent) {
                    eventText = `Last D${lastEvent.event_id} ${String(lastEvent.severity || "").toUpperCase()}`;
                    reviewText = lastEvent.review_note || lastEvent.primary_label || reviewText;
                }
                document.getElementById("event-val").innerText = eventText;
                document.getElementById("review-val").innerText = reviewText;

                setBar("focus-bar", d.focus_score || 0);
                setBar("load-bar", d.cognitive_load || 0, true);
                setBar("session-bar", (session.progress || 0) * 100);
                setLoadClass(d.load_level);

                if (d.flashcard && d.flashcard.word) {
                    showFlashcard(d.flashcard);
                }
            } catch (err) {
                document.getElementById("guidance-text").innerText = "Waiting for learning-state data.";
            }
        }

        function showFlashcard(cardData) {
            const card = document.getElementById("flashcard");
            const wordEl = document.getElementById("word");
            const transEl = document.getElementById("trans");

            const collect = cardData.type === "collect";
            card.style.borderColor = collect ? "#ffcc00" : "#00ff9d";
            wordEl.style.color = collect ? "#ffcc00" : "#fff";
            transEl.style.fontFamily = collect ? "monospace" : "inherit";

            wordEl.innerText = cardData.word;
            transEl.innerText = cardData.trans;
            card.style.display = "block";

            if (audio && cardData.type === "ocr") {
                window.speechSynthesis.speak(new SpeechSynthesisUtterance(cardData.word));
            }
            setTimeout(() => card.style.display = "none", 4000);
        }

        window.onkeydown = (e) => {
            if (e.code === "Space") fetch("/capture");
            if (e.code === "Enter") fetch("/collect");
            if (e.code === "KeyC") fetch("/calibrate");
            if (e.code === "KeyR") fetch("/reset_session");
        };

        setInterval(update, 500);
        update();
    </script>
</body>
</html>
